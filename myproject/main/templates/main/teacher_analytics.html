<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老師課程分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 1200px;
        margin: 50px auto;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        margin-bottom: 24px;
      }

      h1 {
        margin-top: 0;
        font-size: 34px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .stat-box {
        background: #eff6ff;
        border-radius: 16px;
        padding: 22px;
      }

      .number {
        font-size: 32px;
        color: #2563eb;
        font-weight: bold;
      }

      .chart-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(430px, 1fr));
        gap: 24px;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        background: #2563eb;
        color: white;
        padding: 12px 22px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
      }

      .btn-dark {
        background: #1f2937;
      }
    </style>
  </head>

  <body>
    {% include 'main/partials/navbar.html' %}

    <div class="container">
      <div class="card">
        <h1>老師課程分析</h1>
        <p>這裡會依照你的課程訂單、觀看紀錄與評價，即時產生分析圖表。</p>

        <div class="stats">
          <div class="stat-box">
            <h3>總營收</h3>
            <div class="number">NT$ {{ total_revenue }}</div>
          </div>

          <div class="stat-box">
            <h3>總購買數</h3>
            <div class="number">{{ total_purchase_count }}</div>
          </div>

          <div class="stat-box">
            <h3>總觀看分鐘</h3>
            <div class="number">{{ total_watch_minutes }}</div>
          </div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="card">
          <h2>各課程購買數</h2>
          <canvas id="purchaseChart"></canvas>
        </div>

        <div class="card">
          <h2>各課程營收</h2>
          <canvas id="revenueChart"></canvas>
        </div>

        <div class="card">
          <h2>各課程觀看分鐘</h2>
          <canvas id="watchChart"></canvas>
        </div>

        <div class="card">
          <h2>各課程平均評分</h2>
          <canvas id="ratingChart"></canvas>
        </div>
      </div>

      <div class="card">
        <a href="{% url 'teacher_dashboard' %}" class="btn btn-dark"
          >回老師首頁</a
        >
      </div>
    </div>

    <script>
      const courseLabels = {{ course_labels_json|safe }};
      const purchaseCounts = {{ purchase_counts_json|safe }};
      const revenueData = {{ revenue_data_json|safe }};
      const watchMinutesData = {{ watch_minutes_data_json|safe }};
      const ratingData = {{ rating_data_json|safe }};

      new Chart(document.getElementById("purchaseChart"), {
        type: "bar",
        data: {
          labels: courseLabels,
          datasets: [{
            label: "購買數",
            data: purchaseCounts
          }]
        },
        options: {
          responsive: true
        }
      });

      new Chart(document.getElementById("revenueChart"), {
        type: "bar",
        data: {
          labels: courseLabels,
          datasets: [{
            label: "營收",
            data: revenueData
          }]
        },
        options: {
          responsive: true
        }
      });

      new Chart(document.getElementById("watchChart"), {
        type: "bar",
        data: {
          labels: courseLabels,
          datasets: [{
            label: "觀看分鐘",
            data: watchMinutesData
          }]
        },
        options: {
          responsive: true
        }
      });

      new Chart(document.getElementById("ratingChart"), {
        type: "bar",
        data: {
          labels: courseLabels,
          datasets: [{
            label: "平均評分",
            data: ratingData
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              min: 0,
              max: 5
            }
          }
        }
      });
    </script>
  </body>
</html>
